name: Build & Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'src/BeautyStore.Api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:          # manual trigger from GitHub UI

env:
  ACR_REGISTRY: beautystoredevacr5npzse.azurecr.io
  ACR_REPO:     beautystore-api
  APP_NAME:     beautystore-dev-api
  RESOURCE_GROUP: rg-beautystore-shared

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BeautyStore.Api/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPO }}:${{ github.sha }} \
            --query "properties.latestRevisionName" -o tsv
